  api_key: ""
  api_base: ""
  timeout: 120
  temperature: 1.0
  max_tokens: 5000

ai_analysis:
  enabled: false
  language: "Chinese"
  prompt_file: "ai_analysis_prompt.txt"
  mode: "follow_report"
  max_news_for_analysis: 150
  include_rss: false
  include_standalone: true
  include_rank_timeline: true

